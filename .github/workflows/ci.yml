name: CI

# Runs on every PR into main and on pushes to main (so the required checks
# have history on the default branch); also manually triggerable from the
# Actions tab / `gh workflow run ci.yml`.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Least-privilege token: CI only needs to read the repo.
permissions:
  contents: read

# One run per ref; a new push to the same PR cancels the in-progress run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Node side: board deps + a typecheck + the full Node test suite (tests/run.sh),
  # which itself hard-gates board-lint.mjs and drives an isolated throwaway board.
  lint-test:
    name: lint-test
    runs-on: ubuntu-latest
    # tests/run.sh spins up a throwaway `next dev` and waits up to 90s for it
    # to compile; give the job generous headroom on a cold runner.
    timeout-minutes: 20
    env:
      CI: "true"
      # Suppress Next.js telemetry on the throwaway dev server (no network notice).
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CI never pushes; don't leave the token in the runner's git config.
          persist-credentials: false

      # Node 22 is REQUIRED: the unit step uses node:test TS type-stripping,
      # which only exists on Node >= 22.6 (below 22 the unit suite self-skips).
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            board/package-lock.json

      # Workspace root deps (mcp/*-server, packages/*) so the stdio MCP tests
      # (api-vault, mcp-kit-idle) RUN instead of self-skipping on a missing SDK.
      - name: Install workspace deps
        run: npm ci

      # Board deps so start_test_board finds node_modules/.bin/next and the
      # api-* integration steps RUN instead of silently skipping.
      - name: Install board deps
        run: npm ci --prefix board

      # `next lint` (board/package.json) is deprecated (removed in Next.js 16) and
      # would HANG CI on its interactive ESLint-setup prompt (the board ships no
      # eslint config or deps). We use the TypeScript compiler as the deterministic
      # static gate instead. Board-invariant linting still runs via board-lint.mjs
      # inside tests/run.sh below.
      - name: Typecheck board
        run: npx --no-install tsc --noEmit
        working-directory: board

      # board/data/ is gitignored, so a fresh checkout has no cases.json.
      # board-lint is a HARD gate, so seed it from the committed lint-clean
      # fixture BEFORE running the suite (a missing file makes the suite FAIL).
      - name: Seed board store
        run: |
          mkdir -p board/data
          cp tests/fixtures/board-seed.json board/data/cases.json

      # Full Node suite: unit + board-lint (hard gate) + vault grep + api-*
      # integration against the throwaway board. Exits nonzero on any hard-gate
      # failure, so CI fails correctly. uv is not installed in this job, so the
      # two python sidecar steps inside run.sh self-skip (exit 0) — they run in
      # the `python` job below instead.
      - name: Run full test suite
        run: bash tests/run.sh

  # Python side: the two offline FastAPI sidecar pytest suites. Forced onto the
  # hermetic heuristic/hash code paths so NO model is downloaded and no network
  # / HuggingFace auth is needed.
  python:
    name: python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # CI never pushes; don't leave the token in the runner's git config.
          persist-credentials: false

      # uv provisions its own interpreter and the venv on first `uv run`.
      # Pin Python to 3.12 (both sidecars require-python >= 3.11).
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.12"

      # Heuristic classifier => pure-regex path, never imports torch/transformers
      # and never downloads the gated Llama Prompt Guard model. Offline flags are
      # belt-and-suspenders.
      - name: Guard pytest (offline)
        run: COS_GUARD_CLASSIFIER=heuristic HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 uv run --extra dev pytest -q
        working-directory: guard

      # Hash embedder => deterministic pure-numpy path, never constructs the
      # model2vec embedder, so no HF model download and no network.
      - name: Search pytest (offline)
        run: COS_SEARCH_EMBEDDER=hash HF_HUB_OFFLINE=1 TRANSFORMERS_OFFLINE=1 uv run --extra dev pytest -q
        working-directory: search
